<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX - AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            height: 600px;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .controls select {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .controls select option {
            color: #333;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7f8fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
        }

        .message-info {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 5px;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            border-radius: 0 0 20px 20px;
        }

        .input-container {
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            width: fit-content;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator span {
            height: 8px;
            width: 8px;
            background: #667eea;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🤖 MAX - AI Assistant</h1>
                <p>Your friendly guru for Floguru.com</p>
            </div>
            <div class="controls">
                <select id="languageSelect">
                    <option value="en">🇺🇸 English</option>
                    <option value="fr-qc">🇨🇦 Québécois</option>
                    <option value="es">🇪🇸 Español</option>
                    <option value="pt-br">🇧🇷 Português</option>
                </select>
                <select id="roleSelect">
                    <option value="general">General</option>
                    <option value="lawyer">⚖️ Lawyer</option>
                    <option value="plumber">🔧 Plumber</option>
                    <option value="therapist">💆 Therapist</option>
                    <option value="fitness">💪 Fitness Coach</option>
                    <option value="coach">🎯 Life Coach</option>
                    <option value="advertiser">📢 Advertiser</option>
                </select>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div>
                    <div class="message-content" id="initialGreeting">
                        Connecting to MAX...
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type your message here..."
                    autocomplete="off"
                >
                <button id="sendButton">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';
        const userId = 'user_' + Math.random().toString(36).substr(2, 9);
        
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const languageSelect = document.getElementById('languageSelect');
        const roleSelect = document.getElementById('roleSelect');

        let currentLanguage = 'en';
        let currentRole = 'general';

        // Initialize - get greeting
        async function initialize() {
            try {
                const response = await fetch(`${API_BASE}/api/greeting`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, language: currentLanguage })
                });
                const data = await response.json();
                document.getElementById('initialGreeting').textContent = data.message;
            } catch (error) {
                document.getElementById('initialGreeting').innerHTML = 
                    '<div class="error">⚠️ Could not connect to MAX. Make sure the server is running on port 3000.</div>';
            }
        }

        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Add user message to chat
            addMessage(message, 'user');
            messageInput.value = '';
            sendButton.disabled = true;

            // Show typing indicator
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'message assistant';
            typingIndicator.innerHTML = `
                <div>
                    <div class="typing-indicator active">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatArea.appendChild(typingIndicator);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId,
                        message,
                        language: currentLanguage,
                        role: currentRole
                    })
                });

                const data = await response.json();
                
                // Remove typing indicator
                typingIndicator.remove();

                if (data.success) {
                    addMessage(data.message, 'assistant', {
                        language: data.language,
                        role: data.role
                    });
                } else {
                    addMessage('Sorry, I encountered an error: ' + data.error, 'assistant');
                }
            } catch (error) {
                typingIndicator.remove();
                addMessage('Sorry, I could not process your message. Please try again.', 'assistant');
            }

            sendButton.disabled = false;
            messageInput.focus();
        }

        // Add message to chat
        function addMessage(text, type, metadata = {}) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            let infoText = '';
            if (metadata.language || metadata.role) {
                const lang = metadata.language || currentLanguage;
                const role = metadata.role || currentRole;
                infoText = `<div class="message-info">${lang} • ${role}</div>`;
            }

            messageDiv.innerHTML = `
                <div>
                    <div class="message-content">${text}</div>
                    ${infoText}
                </div>
            `;

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Change language
        languageSelect.addEventListener('change', async (e) => {
            currentLanguage = e.target.value;
            try {
                const response = await fetch(`${API_BASE}/api/language`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, language: currentLanguage })
                });
                const data = await response.json();
                if (data.success) {
                    addMessage(data.message, 'assistant', { language: data.language, role: data.role });
                }
            } catch (error) {
                console.error('Error changing language:', error);
            }
        });

        // Change role
        roleSelect.addEventListener('change', async (e) => {
            currentRole = e.target.value;
            try {
                const response = await fetch(`${API_BASE}/api/role`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, role: currentRole })
                });
                const data = await response.json();
                if (data.success) {
                    addMessage(data.message, 'assistant', { language: data.language, role: data.role });
                }
            } catch (error) {
                console.error('Error changing role:', error);
            }
        });

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Initialize on load
        initialize();
    </script>
</body>
</html>
